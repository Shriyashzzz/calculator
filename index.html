<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel = "stylesheet" href = "style.css">

<body id = "webpage">
    <main id = "mainContainer">
        <p id ="logo">CAISO<p>
        <div>
            <input type = "text"  class = "displayBox">

        </div>    
        <section id = "content">
            <div id = "leftButtons">
                <div class="leftButtonsContainer">
                    <button class = "numButton button">9</button>
                    <button class = "numButton button">8</button>
                    <button class = "numButton button">7</button>   
                </div>
               
                <div class="leftButtonsContainer">
                    <button class = "numButton button">6</button>
                    <button class = "numButton button">5</button>
                    <button class = "numButton button">4</button>
                </div>

                <div class="leftButtonsContainer">
                    <button class = "numButton button">3</button>
                    <button class = "numButton button">2</button>
                    <button class = "numButton button">1</button>
                </div>
                

                <div class="leftButtonsContainer">
                    <button class = "button deleteButton">Delete</button>
                    <button class = "button dotButton">.</button>
                    <button class = "numButton button zeroButton" >0</button>
                </div>
            </div>
            <div id = "rightButtons">
                <button class = "button-49 clearButton"> Clear </button>
                <button class = "button multiplybutton operator">*</button>
                <button class = "button divideButton operator">/</button>
                <button class = "button subtractButton operator">-</button>
                <button class = "button addButton operator">+</button>
                <button class = "button equalsButton">=</button>

            </div>

        </section>

    <footer class = "footer">
